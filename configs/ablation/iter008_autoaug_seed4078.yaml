# 2-seed hardening pass for Cell C (autoaug) — seed=4078 replay of iter004.
# Single delta vs iter004_autoaugment.yaml: seed 42 -> 4078 (program.md
# §Required ablation strategy: "After phase 1, pick top 2, run with
# seed=4078, report 2-seed mean."). All other knobs identical to iter004
# (Cell C): aug=autoaugment, sgd 0.1, momentum 0.9, wd 5e-4, nesterov,
# cosine, epochs=60. This 2nd seed validates whether Cell C's +0.47 pp
# Partial gain over Cell B (0.9528 vs 0.9481) is real or seed-luck.
exp_name: cifar10_iter008_autoaug_seed4078
seed: 4078

data:
  root: ./data/cifar10
  augmentation: autoaugment
  batch_size: 128
  num_workers: 4
  download: true

model:
  arch: resnet34
  num_classes: 10

training:
  optimizer: sgd
  lr: 0.1
  momentum: 0.9
  weight_decay: 5.0e-4
  nesterov: true
  scheduler: cosine
  epochs: 60

output:
  root: runs
