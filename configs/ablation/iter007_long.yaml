# Ablation: long training (Cell F — A6 axis swap from Cell B)
# Single-axis delta from iter004_std.yaml: epochs 60 → 100. Everything else
# held at the Cell B recipe (standard aug, sgd 0.1 mom 0.9 nesterov wd 5e-4,
# cosine schedule, seed=42). Cosine T_max scales with the new epoch budget,
# so this is a clean A6 test rather than a schedule-shape test.
exp_name: cifar10_iter007_long
seed: 42

data:
  root: ./data/cifar10
  augmentation: standard
  batch_size: 128
  num_workers: 4
  download: true

model: { arch: resnet34, num_classes: 10 }
training:
  optimizer: sgd
  lr: 0.1
  momentum: 0.9
  weight_decay: 5.0e-4
  nesterov: true
  scheduler: cosine
  epochs: 100
output: { root: runs }
