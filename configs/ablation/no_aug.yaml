# Ablation: disable data augmentation (cell A — bare baseline)
exp_name: cifar10_iter001_no_aug
seed: 42

data:
  root: /data/cifar10
  augmentation: none
  batch_size: 128
  num_workers: 4
  download: true

model: { arch: resnet34, num_classes: 10 }
training:
  optimizer: sgd
  lr: 0.1
  momentum: 0.9
  weight_decay: 5.0e-4
  scheduler: cosine
  epochs: 60
output: { root: runs }
