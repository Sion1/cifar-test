# Baseline config — CIFAR-10 + ResNet-34
# Feel free to clone and edit for ablations under configs/ablation/

exp_name: cifar10_baseline
seed: 42

data:
  root: /data/cifar10
  augmentation: standard      # none | standard | autoaugment
  batch_size: 128
  num_workers: 4
  download: true

model:
  arch: resnet34
  num_classes: 10

training:
  optimizer: sgd              # sgd | adamw | adam
  lr: 0.1
  momentum: 0.9
  weight_decay: 5.0e-4
  nesterov: true
  scheduler: cosine           # cosine | multistep | none
  epochs: 60

output:
  root: runs
